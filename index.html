<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AI 실시간 유해위험요인 파악</title>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
  
  <style>
    body { 
      margin: 0; 
      font-family: -apple-system, sans-serif; 
      background: #111; 
      color: white; 
      overflow: hidden; 
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    /* 공통 버튼 스타일 */
    .btn {
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }
    .btn:active {
      transform: scale(0.98);
    }

    /* 1. 초기 시작/종료 대기 화면 스타일 */
    #welcome-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 30px;
      box-sizing: border-box;
    }
    .icon-shield {
      font-size: 5rem;
      margin-bottom: 20px;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }
    .main-title {
      font-size: 1.6rem;
      color: #ffcc00;
      margin: 0 0 15px 0;
    }
    .sub-text {
      color: #aaa;
      font-size: 0.95rem;
      line-height: 1.6;
      margin-bottom: 40px;
    }
    .btn-start {
      padding: 16px 50px;
      background: #ffcc00;
      color: #000;
      font-size: 1.2rem;
      border-radius: 30px;
      box-shadow: 0 4px 15px rgba(255, 204, 0, 0.3);
    }

    /* 2. 실제 AI 카메라 분석 화면 스타일 */
    #app-screen {
      display: none; 
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
    }
    
    #header-bar {
      position: absolute; 
      top: 15px; 
      z-index: 10; 
      width: 95vw;
      max-width: 500px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(0, 0, 0, 0.75); 
      padding: 8px 15px; 
      border-radius: 25px; 
      border: 1px solid #ffcc00;
      box-sizing: border-box;
    }
    
    #header-bar h1 { 
      font-size: 1rem; 
      margin: 0;
      color: #fff;
    }

    .btn-exit {
      background: #ff3300;
      color: white;
      padding: 6px 14px;
      border-radius: 15px;
      font-size: 0.85rem;
    }
    
    #video-container { 
      position: relative; 
      width: 95vw; 
      height: 75vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    video { 
      width: 100%; 
      height: 100%; 
      object-fit: contain; 
      border-radius: 12px; 
      background: #000; 
    }
    
    canvas { 
      position: absolute; 
      pointer-events: none; 
    }
    
    #loading { 
      position: absolute; 
      bottom: 30px; 
      font-size: 0.9rem; 
      color: #bbbbbb; 
      background: rgba(0,0,0,0.5);
      padding: 5px 15px;
      border-radius: 10px;
      z-index: 10;
    }

    /* 3. [신규] 리소스 경고 안내 커스텀 모달창 스타일 */
    #confirm-modal {
      position: fixed; 
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.85); 
      display: none; /* JS로 제어 */
      align-items: center; 
      justify-content: center; 
      z-index: 100;
    }
    .modal-box {
      background: #222; 
      padding: 30px; 
      border-radius: 16px; 
      text-align: center; 
      max-width: 85%; 
      width: 340px;
      border: 1px solid #444;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    }
    .modal-icon {
      font-size: 3rem;
      margin-bottom: 15px;
      color: #ffcc00;
    }
    .modal-text {
      font-size: 0.95rem;
      line-height: 1.6;
      margin-bottom: 25px;
      color: #ddd;
    }
    /* 종료버튼 글자 강렬한 레드 색상 강조 */
    .highlight-word {
      color: #ff3300;
      font-weight: bold;
      background: rgba(255, 51, 0, 0.1);
      padding: 2px 6px;
      border-radius: 4px;
      border: 1px solid rgba(255, 51, 0, 0.3);
    }
    .modal-btn-group {
      display: flex;
      gap: 12px;
      justify-content: center;
    }
    .btn-modal {
      padding: 12px 24px;
      font-size: 0.95rem;
    }
    .btn-cancel {
      background: #444;
      color: white;
      width: 40%;
    }
    .btn-confirm {
      background: #ffcc00;
      color: black;
      width: 60%;
    }
  </style>
</head>
<body>

  <div id="welcome-screen">
    <div class="icon-shield" id="main-icon">🛡️</div>
    <h2 class="main-title" id="welcome-title">AI 실시간 유해위험요인 파악</h2>
    <p class="sub-text" id="welcome-desc">
      아래 [시작하기] 버튼을 누르면 카메라가 활성화되며,<br>
      현장의 유해 위험 요인을 실시간으로 분석합니다.
    </p>
    <button class="btn btn-start" id="action-button" onclick="openModal()">시작하기</button>
  </div>

  <div id="app-screen">
    <div id="header-bar">
      <h1>AI 실시간 유해위험요인 파악</h1>
      <button class="btn btn-exit" onclick="stopApp()">종료</button>
    </div>
    
    <div id="video-container">
      <video id="webcam" autoplay playsinline muted></video>
      <canvas id="overlay"></canvas>
    </div>

    <div id="loading">시스템 초기화 중...</div>
  </div>

  <div id="confirm-modal">
    <div class="modal-box">
      <div class="modal-icon">⚠️</div>
      <div class="modal-text">
        실시간 분석(AI 연산)에 이 기기의 리소스를 사용합니다. 
        사용 후 <span class="highlight-word">종료버튼</span>을 꼭 눌러주세요.<br><br>
        분석을 시작하시겠습니까?
      </div>
      <div class="modal-btn-group">
        <button class="btn btn-modal btn-cancel" onclick="closeModal()">취소</button>
        <button class="btn btn-modal btn-confirm" onclick="startApp()">분석 시작하기</button>
      </div>
    </div>
  </div>

<script>
  const welcomeScreen = document.getElementById('welcome-screen');
  const appScreen = document.getElementById('app-screen');
  const confirmModal = document.getElementById('confirm-modal');
  const video = document.getElementById('webcam');
  const canvas = document.getElementById('overlay');
  const ctx = canvas.getContext('2d');
  const loadingText = document.getElementById('loading');
  
  const mainIcon = document.getElementById('main-icon');
  const welcomeTitle = document.getElementById('welcome-title');
  const welcomeDesc = document.getElementById('welcome-desc');
  const actionButton = document.getElementById('action-button');
  
  let model = null;
  let localStream = null;
  let animationFrameId = null;

  async function loadModel() {
    if (model) return; 
    loadingText.innerText = "AI 안전 분석 모델 로딩 중...";
    model = await cocoSsd.load();
  }

  // 모달창 열기 (시작하기 / 다시 시작하기 공통 작동)
  function openModal() {
    confirmModal.style.display = 'flex';
  }

  // 모달창 닫기
  function closeModal() {
    confirmModal.style.display = 'none';
  }

  // 카메라 및 AI 분석 시작
  async function startApp() {
    closeModal(); // 모달창 닫기
    welcomeScreen.style.display = 'none';
    appScreen.style.display = 'flex';
    loadingText.innerText = "카메라 연결 중...";
    
    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: "environment" },
        audio: false
      });
      localStream = stream;
      video.srcObject = stream;
      
      video.onloadedmetadata = async () => {
        video.width = video.videoWidth;
        video.height = video.videoHeight;
        
        await loadModel();
        loadingText.innerText = "분석 작동 중 (실시간 탐지)";
        
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
        
        detectFrame();
      };
    } catch (err) {
      alert("카메라를 켤 수 없습니다. 권한 설정을 확인해주세요: " + err.message);
      goToWelcomeScreen();
    }
  }

  function resizeCanvas() {
    const rect = video.getBoundingClientRect();
    canvas.style.width = rect.width + 'px';
    canvas.style.height = rect.height + 'px';
    canvas.style.top = video.offsetTop + 'px';
    canvas.style.left = video.offsetLeft + 'px';
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
  }

  async function detectFrame() {
    if (!model) return;

    if (video.readyState === video.HAVE_ENOUGH_DATA) {
      const predictions = await model.detect(video);
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      predictions.forEach(prediction => {
        const [x, y, width, height] = prediction.bbox;
        const label = prediction.class;
        const score = Math.round(prediction.score * 100);

        let hazardType = `미분류 요인 (${label})`;
        let boxColor = "#ffcc00"; 

        if (label === 'person') {
          hazardType = "작업자 감지 (추락/충돌 주의)";
          boxColor = "#ffcc00";
        } else if (['truck', 'car', 'bus'].includes(label)) {
          hazardType = "중장비/차량 (부딪힘 위험)";
          boxColor = "#ff3300";
        } else if (label === 'cell phone') {
          hazardType = "스마트폰 사용 (보행 주의)";
          boxColor = "#ff3300";
        } else if (['cup', 'bottle'].includes(label)) {
          hazardType = "액체 물질 (미끄러짐 위험)";
          boxColor = "#00FF00";
        } else if (['laptop', 'keyboard', 'mouse', 'tv'].includes(label)) {
          hazardType = "전자기기 (감전/과열 주의)";
          boxColor = "#00FF00";
        } else if (label === 'chair') {
          hazardType = "방치된 의자 (전도 위험)";
          boxColor = "#00FF00";
        }

        ctx.strokeStyle = boxColor;
        ctx.lineWidth = 6;
        ctx.strokeRect(x, y, width, height);

        ctx.fillStyle = boxColor;
        ctx.font = "bold 20px Arial";
        const textStr = `${hazardType} [${score}%]`;
        const textWidth = ctx.measureText(textStr).width;
        
        ctx.fillRect(x, y - 32, textWidth + 12, 32);
        ctx.fillStyle = "#000000";
        ctx.fillText(textStr, x + 6, y - 10);
      });
    }
    animationFrameId = requestAnimationFrame(detectFrame);
  }

  // 종료 프로세스 (요청 문구 반영 완료)
  function stopApp() {
    if (animationFrameId) {
      cancelAnimationFrame(animationFrameId);
      animationFrameId = null;
    }

    if (localStream) {
      localStream.getTracks().forEach(track => track.stop());
      localStream = null;
    }

    video.srcObject = null;
    window.removeEventListener('resize', resizeCanvas);
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    appScreen.style.display = 'none';
    
    // UI 텍스트 및 환경 업데이트
    mainIcon.innerText = "✅";
    welcomeTitle.innerText = "AI 분석 안전 종료됨";
    welcomeDesc.innerHTML = "이 기기의 카메라 및 리소스 사용이 완벽히 종료되었습니다.<br>(발열과 배터리 소모 차단)";
    actionButton.innerText = "다시 시작하기";
    
    welcomeScreen.style.display = 'flex';
  }

  function goToWelcomeScreen() {
    appScreen.style.display = 'none';
    welcomeScreen.style.display = 'flex';
  }
</script>

</body>
</html>
