<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>멀티모드 AI CCTV</title>
  
  <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
  
  <style>
    body { margin: 0; font-family: -apple-system, sans-serif; background: #111; color: white; overflow-x: hidden; overflow-y: auto; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; min-height: 100vh; }
    .btn { border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: background 0.2s, transform 0.1s; }
    .btn:active { transform: scale(0.98); }
    
    #welcome-screen { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 30px; box-sizing: border-box; background: #111; color: #ffffff; z-index: 250; }
    .icon-shield { font-size: 5rem; margin-bottom: 20px; animation: pulse 2s infinite; }
    @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
    .main-title { font-size: 1.6rem; color: #ffcc00; margin: 0 0 15px 0; }
    .sub-text { color: #aaa; font-size: 0.95rem; line-height: 1.6; margin-bottom: 40px; }
    .btn-start { padding: 16px 50px; background: #ffcc00; color: #000; font-size: 1.2rem; border-radius: 30px; box-shadow: 0 4px 15px rgba(255, 204, 0, 0.3); }
    
    #app-screen { display: none; flex-direction: column; align-items: center; width: 100vw; padding-top: 130px; padding-bottom: 40px; box-sizing: border-box; }
    
    #header-bar { position: fixed; top: 15px; z-index: 150; width: 95vw; max-width: 500px; display: flex; flex-direction: column; gap: 8px; background: rgba(0, 0, 0, 0.85); padding: 10px 15px; border-radius: 20px; border: 1px solid #ffcc00; box-sizing: border-box; backdrop-filter: blur(5px); }
    .header-top { display: flex; justify-content: space-between; align-items: center; width: 100%; }
    #header-bar h1 { font-size: 1.1rem; margin: 0; color: #fff; font-weight: bold; }
    .btn-exit { background: #ff3300; color: white; padding: 6px 14px; border-radius: 15px; font-size: 0.85rem; }
    
    .toggle-container { display: flex; width: 100%; background: #222; border-radius: 10px; padding: 3px; box-sizing: border-box; border: 1px solid #444; gap: 4px; }
    .toggle-btn { flex: 1; text-align: center; padding: 8px 0; font-size: 0.75rem; font-weight: bold; color: #888; border-radius: 7px; transition: all 0.2s; cursor: pointer; }
    .toggle-btn.active { background: #ffcc00; color: #000; box-shadow: 0 2px 8px rgba(255,204,0,0.3); }
    
    #video-container { position: relative; width: 100vw; height: 70vh; max-height: 70vh; display: flex; align-items: center; justify-content: center; background: #000; overflow: hidden; }
    video { width: 100%; height: 100%; object-fit: contain; background: #000; }
    canvas { position: absolute; pointer-events: none; }
    
    #loading { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); font-size: 0.9rem; color: #bbbbbb; background: rgba(0,0,0,0.75); padding: 6px 18px; border-radius: 20px; z-index: 160; pointer-events: none; border: 1px solid #444; }
    
    #log-panel { width: 95vw; max-width: 500px; height: 250px; min-height: 250px; background: rgba(20, 20, 20, 0.95); border: 1px solid #333; border-radius: 12px; margin-top: 20px; padding: 12px; box-sizing: border-box; display: flex; flex-direction: column; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
    #log-header { font-size: 0.85rem; font-weight: bold; color: #ffcc00; margin-bottom: 8px; border-bottom: 1px solid #222; padding-bottom: 6px; display: flex; justify-content: space-between; }
    #log-container { flex: 1; overflow-y: auto; font-family: monospace; font-size: 0.78rem; line-height: 1.5; }
    .log-item { margin-bottom: 4px; animation: slideDown 0.2s ease-out; border-left: 3px solid; padding-left: 6px; }
    @keyframes slideDown { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }

    #confirm-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.85); display: none; align-items: center; justify-content: center; z-index: 300; }
    .modal-box { background: #222; padding: 30px; border-radius: 16px; text-align: center; max-width: 85%; width: 340px; border: 1px solid #444; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
    .modal-icon { font-size: 3rem; margin-bottom: 15px; color: #ffcc00; }
    .modal-text { font-size: 0.95rem; line-height: 1.6; margin-bottom: 25px; color: #ddd; text-align: center; }
    .highlight-word { color: #ff3300; font-weight: bold; background: rgba(255, 51, 0, 0.1); padding: 2px 6px; border-radius: 4px; border: 1px solid rgba(255, 51, 0, 0.3); }
    .modal-btn-group { display: flex; gap: 12px; justify-content: center; }
    .btn-modal { padding: 12px 24px; font-size: 0.95rem; }
    .btn-cancel { background: #444; color: white; width: 40%; }
    .btn-confirm { background: #ffcc00; color: black; width: 60%; }
  </style>
</head>
<body>

  <div id="welcome-screen">
    <div class="icon-shield" id="main-icon">🛡️</div>
    <h2 class="main-title" id="welcome-title">멀티모드 AI CCTV</h2>
    <p class="sub-text" id="welcome-desc">아래 [시작하기] 버튼을 누르면 카메라가 활성화되며,<br>현장의 유해 위험 요인을 실시간으로 분석합니다.</p>
    <button class="btn btn-start" id="action-button" onclick="openModal()">시작하기</button>
  </div>

  <div id="app-screen">
    <div id="header-bar">
      <div class="header-top">
        <h1>멀티모드 AI CCTV</h1>
        <button class="btn btn-exit" onclick="stopApp()">종료</button>
      </div>
      <div class="toggle-container">
        <div id="mode-coco" class="toggle-btn active" onclick="switchBrain('coco')">🌐 일상생활</div>
        <div id="mode-safety" class="toggle-btn" onclick="switchBrain('safety')">🚧 건설현장</div>
        <div id="mode-fire" class="toggle-btn" onclick="switchBrain('fire')">🔥 화재감시</div>
      </div>
    </div>
    
    <div id="video-container">
      <video id="webcam" autoplay playsinline muted></video>
      <canvas id="overlay"></canvas>
    </div>

    <div id="log-panel">
      <div id="log-header">
        <span>📋 안전 모니터링 실시간 위험 로그</span>
        <span style="color: #666; font-size: 0.75rem;">최신순 정렬</span>
      </div>
      <div id="log-container"></div>
    </div>
    
    <div id="loading">시스템 초기화 중...</div>
  </div>

  <div id="confirm-modal">
    <div class="modal-box">
      <div class="modal-icon">⚠️</div>
      <div class="modal-text">
        실시간 분석(AI 연산)에 이 기기의 리소스를 사용합니다. 
        사용 후 <span class="highlight-word">종료버튼</span>을 꼭 눌러주세요.<br><br>
        CCTV를 켜시겠습니까?
      </div>
      <div class="modal-btn-group">
        <button class="btn btn-modal btn-cancel" onclick="closeModal()">취소</button>
        <button class="btn btn-modal btn-confirm" onclick="startApp()">CCTV 켜기</button>
      </div>
    </div>
  </div>

<script>
  const welcomeScreen = document.getElementById('welcome-screen');
  const appScreen = document.getElementById('app-screen');
  const confirmModal = document.getElementById('confirm-modal');
  const video = document.getElementById('webcam');
  const canvas = document.getElementById('overlay');
  const ctx = canvas.getContext('2d');
  const loadingText = document.getElementById('loading');
  const logContainer = document.getElementById('log-container');
  const mainIcon = document.getElementById('main-icon');
  const welcomeTitle = document.getElementById('welcome-title');
  const welcomeDesc = document.getElementById('welcome-desc');
  const actionButton = document.getElementById('action-button');
  
  let sessionCoco = null;
  let sessionSafety = null;
  let sessionFire = null; 
  let currentBrain = 'coco'; 
  let isChanging = false;
  let isProcessing = false; 
  let localStream = null;
  let animationFrameId = null;
  const lastLogTimes = {};

  const classesCoco = ['person', 'bicycle', 'car', 'motorcycle', 'airplane', 'bus', 'train', 'truck', 'boat', 'traffic light', 'fire hydrant', 'stop sign', 'parking meter', 'bench', 'bird', 'cat', 'dog', 'horse', 'sheep', 'cow', 'elephant', 'bear', 'zebra', 'giraffe', 'backpack', 'umbrella', 'handbag', 'tie', 'suitcase', 'frisbee', 'skis', 'snowboard', 'sports ball', 'kite', 'baseball bat', 'baseball glove', 'skateboard', 'surfboard', 'tennis racket', 'bottle', 'wine glass', 'cup', 'fork', 'knife', 'spoon', 'bowl', 'banana', 'apple', 'sandwich', 'orange', 'broccoli', 'carrot', 'hot dog', 'pizza', 'donut', 'cake', 'chair', 'couch', 'potted plant', 'bed', 'dining table', 'toilet', 'tv', 'laptop', 'mouse', 'remote', 'keyboard', 'cell phone', 'microwave', 'oven', 'toaster', 'sink', 'refrigerator', 'book', 'clock', 'vase', 'scissors', 'teddy bear', 'hair drier', 'toothbrush'];
  const classesSafety = ['Hardhat', 'Mask', 'NO-Hardhat', 'NO-Mask', 'NO-Safety Vest', 'Person', 'Safety Cone', 'Safety Vest', 'machinery', 'vehicle'];

  // 🌟 [다이어트 완료] 한승훈님이 전달해주신 80종 최신 명단 반영! 숨김 처리된 기물은 완벽하게 제외했습니다.
  const cocoTranslation = {
    'person': { text: "사람 (주의)", color: "#00FF00" },
    'bicycle': { text: "자전거 (충돌 주의)", color: "#ffcc00" },
    'car': { text: "차량 (교통위험 통제)", color: "#ff3300" },
    'motorcycle': { text: "오토바이 (충돌 위험)", color: "#ff3300" },
    'airplane': { text: "항공기 (접근 주의)", color: "#ffcc00" },
    'bus': { text: "버스 (사각지대 경고)", color: "#ff3300" },
    'train': { text: "열차 (선로 접근 차단)", color: "#ff3300" },
    'truck': { text: "중장비/트럭 (협착 치명 위험)", color: "#ff3300" },
    'boat': { text: "선박 (충돌/추락 주의)", color: "#ffcc00" },
    'traffic light': { text: "신호등 (신호 준수)", color: "#00FF00" },
    'fire hydrant': { text: "소화전 (구역 점거 차단)", color: "#00FF00" },
    'stop sign': { text: "정지 표지판 (정지 준수)", color: "#ff3300" },
    'cat': { text: "고양이 (귀여움 주의)", color: "#ffcc00" },
    'dog': { text: "개 (귀여움 주의)", color: "#ffcc00" },
    'elephant': { text: "곰 (피신 요망)", color: "#ffcc00" },
    'bear': { text: "곰 (피신 요망)", color: "#ffcc00" },
    'backpack': { text: "배낭 (장애물 요인)", color: "#00FF00" },
    'umbrella': { text: "우산 (시야 차단 주의)", color: "#00FF00" },
    'suitcase': { text: "여행가방 (통행 방해)", color: "#00FF00" },
    'bottle': { text: "병 (취급 주의)", color: "#00FF00" },
    'wine glass': { text: "유리잔 (취급 주의)", color: "#00FF00" },
    'cup': { text: "컵 (취급 주의)", color: "#00FF00" },
    'fork': { text: "포크 (취급 주의)", color: "#00FF00" },
    'knife': { text: "칼 (치명상 가능)", color: "#ff3300" },
    'sandwich': { text: "샌드위치 (배고픔 주의)", color: "#ffcc00" },
    'orange': { text: "오렌지 (상큼함 주의)", color: "#ffcc00" },
    'hot dog': { text: "핫도그 (배고픔 주의)", color: "#ffcc00" },
    'pizza': { text: "피자 (배고픔 주의)", color: "#ffcc00" },
    'donut': { text: "도너츠 (혈당스파이크)", color: "#ffcc00" },
    'cake': { text: "케이크 (혈당스파이크)", color: "#ffcc00" },
    'chair': { text: "의자 (전도 위험)", color: "#00FF00" },
    'couch': { text: "소파 (대형 집기 적재)", color: "#00FF00" },
    'potted plant': { text: "화분 (낙하 위험)", color: "#00FF00" },
    'tv': { text: "TV/모니터 (과열 주의)", color: "#00FF00" },
    'laptop': { text: "노트북 (전열 화재 관리)", color: "#00FF00" },
    'cell phone': { text: "스마트폰 (보행 주의)", color: "#00FF00" },
    'microwave': { text: "전자레인지 (고온 화상 위험)", color: "#ff3300" },
    'oven': { text: "오븐 (고온 화재 치명 위험)", color: "#ff3300" },
    'toaster': { text: "토스터기 (누전 화재 주의)", color: "#ff3300" },
    'book': { text: "서적 (다독 요망)", color: "#00FF00" },
    'vase': { text: "꽃병 (파손 파편 주의)", color: "#ffcc00" },
    'scissors': { text: "가위 (베임 위험)", color: "#ff3300" },
    'hair drier': { text: "헤어드라이어 (감전 위험)", color: "#ff3300" }
  };

  function throttleLog(key, message, color) {
    const now = Date.now();
    if (!lastLogTimes[key] || (now - lastLogTimes[key] > 4500)) {
      lastLogTimes[key] = now;
      const time = new Date();
      const timeStr = `${String(time.getHours()).padStart(2,'0')}:${String(time.getMinutes()).padStart(2,'0')}:${String(time.getSeconds()).padStart(2,'0')}`;
      const logItem = document.createElement('div');
      logItem.className = 'log-item';
      logItem.style.color = color;
      logItem.style.borderLeftColor = color;
      logItem.innerHTML = `<span style="color: #777; margin-right: 5px;">[${timeStr}]</span>${message}`;
      logContainer.insertBefore(logItem, logContainer.firstChild);
      if (logContainer.children.length > 35) logContainer.removeChild(logContainer.lastChild);
    }
  }

  async function loadSelectedBrain(mode) {
    loadingText.style.display = 'block';
    loadingText.innerText = "YOLO 고정밀 ONNX 안전 모델 로딩 중...";
    try {
      if (mode === 'coco') {
        if (!sessionCoco) {
          sessionCoco = await ort.InferenceSession.create('./yolov8n_coco.onnx', { executionProviders: ['webgl', 'wasm'] });
        }
      } else if (mode === 'safety') {
        if (!sessionSafety) {
          sessionSafety = await ort.InferenceSession.create('./yolov8n_safety.onnx', { executionProviders: ['webgl', 'wasm'] });
        }
      } else if (mode === 'fire') {
        if (!sessionFire) {
          try {
            sessionFire = await ort.InferenceSession.create('./yolov8n_fire.onnx', { executionProviders: ['webgl', 'wasm'] });
          } catch (e) {
            sessionFire = await ort.InferenceSession.create('./yolov8n_fire.onnx', { executionProviders: ['wasm'] });
          }
        }
      }
    } catch (e) {
      console.error(e);
      alert(`⚠️ [모델 로드 실패]\n'yolov8n_${mode}.onnx' 파일의 파일명과 깃허브 업로드 상태를 점검해 주세요.`);
      goToWelcomeScreen();
      loadingText.style.display = 'none';
      return;
    }
    loadingText.style.display = 'none';
  }

  async function switchBrain(mode) {
    if (currentBrain === mode || isChanging) return;
    isChanging = true;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    document.getElementById('mode-coco').classList.remove('active');
    document.getElementById('mode-safety').classList.remove('active');
    document.getElementById('mode-fire').classList.remove('active');
    document.getElementById(`mode-${mode}`).classList.add('active');
    await loadSelectedBrain(mode);
    currentBrain = mode;
    let modeKor = mode === 'coco' ? '일상생활 모드' : mode === 'safety' ? '건설현장 모드' : '화재감시 모드';
    throttleLog("system_switch", `🔄 분석 모드가 [${modeKor}]로 변경되었습니다.`, "#ffcc00");
    isChanging = false;
  }

  function openModal() { confirmModal.style.display = 'flex'; }
  function closeModal() { confirmModal.style.display = 'none'; }

  async function startApp() {
    closeModal();
    welcomeScreen.style.display = 'none';
    appScreen.style.display = 'flex';
    loadingText.innerText = "카메라 연결 중...";
    logContainer.innerHTML = "";
    isProcessing = false;
    window.scrollTo(0, 0);
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: false });
      localStream = stream;
      video.srcObject = stream;
      video.onloadedmetadata = async () => {
        video.width = video.videoWidth;
        video.height = video.videoHeight;
        await loadSelectedBrain(currentBrain);
        loadingText.innerText = "YOLOv8 고속 추적 엔진 가동됨";
        setTimeout(() => { loadingText.style.display = 'none'; }, 2000);
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
        detectFrame();
      };
    } catch (err) {
      alert("카메라 연결 실패: " + err.message);
      goToWelcomeScreen();
    }
  }

  function resizeCanvas() {
    const rect = video.getBoundingClientRect();
    canvas.style.width = rect.width + 'px'; canvas.style.height = rect.height + 'px';
    canvas.style.top = video.offsetTop + 'px'; canvas.style.left = video.offsetLeft + 'px';
    canvas.width = video.videoWidth; canvas.height = video.videoHeight;
  }

  async function detectFrame() {
    if (isProcessing || isChanging) { animationFrameId = requestAnimationFrame(detectFrame); return; }
    let activeSession = sessionCoco; let activeClasses = classesCoco;
    if (currentBrain === 'safety') { activeSession = sessionSafety; activeClasses = classesSafety; }
    else if (currentBrain === 'fire') { activeSession = sessionFire; }

    if (activeSession && video.readyState === video.HAVE_ENOUGH_DATA) {
      isProcessing = true;
      const [onnxData, w_width, h_height] = tf.tidy(() => {
        const img = tf.browser.fromPixels(video).resizeNearestNeighbor([640, 640]).toFloat().div(tf.scalar(255.0));
        return [img.transpose([2, 0, 1]).dataSync(), video.videoWidth, video.videoHeight];
      });
      const inputTensor = new ort.Tensor('float32', onnxData, [1, 3, 640, 640]);
      try {
        const outputMap = await activeSession.run({ [activeSession.inputNames[0]]: inputTensor });
        const outputTensor = outputMap[activeSession.outputNames[0]];
        const dims = outputTensor.dims; const outChannels = dims[1]; const outAnchors = dims[2];

        tf.tidy(() => {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          const result = tf.tensor(outputTensor.data, [1, outChannels, outAnchors]);
          const resTransposed = result.transpose([0, 2, 1]);
          const rawBoxes = tf.slice(resTransposed, [0, 0, 0], [-1, -1, 4]).squeeze();
          const scores = tf.slice(resTransposed, [0, 0, 4], [-1, -1, -1]);
          const maxScores = scores.max(2).squeeze(); const classes = scores.argMax(2).squeeze();

          const cx = tf.slice(rawBoxes, [0, 0], [-1, 1]); const cy = tf.slice(rawBoxes, [0, 1], [-1, 1]);
          const w = tf.abs(tf.slice(rawBoxes, [0, 2], [-1, 1])); const h = tf.abs(tf.slice(rawBoxes, [0, 3], [-1, 1]));
          const xmin = cx.sub(w.div(2)); const ymin = cy.sub(h.div(2)); const xmax = cx.add(w.div(2)); const ymax = cy.add(h.div(2));
          const nmsBoxes = tf.concat([ymin, xmin, ymax, xmax], 1);

          let scoreLimit = (currentBrain === 'fire') ? 0.25 : 0.45;
          const nmsIndices = tf.image.nonMaxSuppression(nmsBoxes, maxScores, 10, 0.45, scoreLimit).arraySync();
          const boxesArray = rawBoxes.arraySync(); const classesArray = classes.arraySync(); const scoresArray = maxScores.arraySync();

          nmsIndices.forEach(idx => {
            const box = boxesArray[idx]; const classIdx = classesArray[idx]; const score = Math.round(scoresArray[idx] * 100);
            const box_w = Math.abs(box[2]); const box_h = Math.abs(box[3]);
            const x = (box[0] - box_w/2) * (canvas.width / 640); const y = (box[1] - box_h/2) * (canvas.height / 640);
            const w_box = box_w * (canvas.width / 640); const h_box = box_h * (canvas.height / 640);

            let displayLabel = ""; let boxColor = "#ffcc00";

            if (currentBrain === 'coco') {
              const label = activeClasses[classIdx];
              const matched = cocoTranslation[label];
              
              // 🌟 [다이어트 선로 가동] 사물 명단 사전에 아예 등록되지 않은 숨김 대상은 연산 및 드로잉을 원천 스킵!
              if (!matched) return;
              
              displayLabel = matched.text; boxColor = matched.color;
              if (boxColor === "#ff3300") {
                throttleLog(label, `⚠️ 위험 요소 포착: [${displayLabel}]`, "#ff3300");
              }
            } 
            else if (currentBrain === 'safety') {
              const label = activeClasses[classIdx];
              if (label === 'Hardhat') { displayLabel = "안전모 착용 확인"; boxColor = "#00FF00"; }
              else if (label === 'NO-Hardhat') { displayLabel = "🚨 위험: 안전모 미착용!!!"; boxColor = "#ff3300"; throttleLog("no_hardhat", "🚨 중대위험: 현장 내 안전모 미착용 작업자 적발! 즉시 조치 요망", "#ff3300"); }
              else if (label === 'Safety Vest') { displayLabel = "안전조끼 착용 확인"; boxColor = "#00FF00"; }
              else if (label === 'NO-Safety Vest') { displayLabel = "🚨 위험: 안전조끼 미착용!!!"; boxColor = "#ff3300"; throttleLog("no_vest", "🚨 중대위험: 안전조끼 미착용 작업자 식별! 안전통제 필요", "#ff3300"); }
              else if (label === 'Mask') { displayLabel = "방진마스크 착용"; boxColor = "#00FF00"; }
              else if (label === 'NO-Mask') { displayLabel = "⏳ 주의: 마스크 미착용"; boxColor = "#ffcc00"; throttleLog("no_mask", "⏳ 보건경고: 분진 작업 구역 내 마스크 미착용자 주의 안내", "#ffcc00"); }
              else if (label === 'Person') { displayLabel = "작업자 식별"; boxColor = "#00FF00"; }
              else if (label === 'Safety Cone') { displayLabel = "안전콘 (통제선)"; boxColor = "#ffcc00"; }
              else if (label === 'machinery') { displayLabel = "⚙️ 건설기계/장비 작동중"; boxColor = "#ffcc00"; throttleLog("machine", "⚙️ 장비알림: 중장비 및 가설 설비 작동 구역 접근 주의", "#ffcc00"); }
              else if (label === 'vehicle') { displayLabel = "⚠️ 위험: 차량 접근중"; boxColor = "#ff3300"; throttleLog("vehicle", "⚠️ 교통안전: 작업 구역 내 이동형 차량/덤프 트랙킹 확인", "#ff3300"); }
            }
            else if (currentBrain === 'fire') {
              if (classIdx === 1) { displayLabel = "🔥 대형위험: 화재 발생!!"; boxColor = "#ff3300"; throttleLog("fire_alert", "🚨🚨 [긴급 화재재난] 구역 내 불꽃 및 발화 요인 감지! 즉시 대피 유도", "#ff3300"); }
              else if (classIdx === 0) { displayLabel = "💨 경고: 연기 포착!!"; boxColor = "#ffcc00"; throttleLog("smoke_alert", "⚠️ [발화 전조현황] 구역 내 미세 연기 및 연소 가스 트랙킹 발생", "#ffcc00"); }
            }
            ctx.globalAlpha = 0.5; ctx.strokeStyle = boxColor; ctx.lineWidth = 3; ctx.strokeRect(x, y, w_box, h_box);
            ctx.fillStyle = boxColor; ctx.font = "bold 15px Arial";
            const textStr = `${displayLabel} [${score}%]`; const textWidth = ctx.measureText(textStr).width;
            ctx.fillRect(x, y - 24, textWidth + 10, 24);
            ctx.globalAlpha = 1.0; ctx.fillStyle = "#000000"; ctx.fillText(textStr, x + 5, y - 7);
          });
        });
      } catch (err) { console.error("AI 추적 연산 에러 무시:", err); } finally { isProcessing = false; }
    }
    animationFrameId = requestAnimationFrame(detectFrame);
  }

  function stopApp() {
    if (animationFrameId) { cancelAnimationFrame(animationFrameId); animationFrameId = null; }
    if (localStream) { localStream.getTracks().forEach(track => track.stop()); localStream = null; }
    video.srcObject = null; window.removeEventListener('resize', resizeCanvas); ctx.clearRect(0, 0, canvas.width, canvas.height);
    appScreen.style.display = 'none'; loadingText.style.display = 'none'; isProcessing = false; window.scrollTo(0, 0); 
    mainIcon.innerText = "✅"; welcomeTitle.innerText = "CCTV 안전 종료됨";
    welcomeDesc.innerHTML = "사용 중이던 카메라 및 그래픽 하드웨어(WebGL) 리소스를 안전하게 반환하였습니다. (스마트폰 발열 및 배터리 누수 완전 차단)";
    actionButton.innerText = "다시 시작하기"; welcomeScreen.style.display = 'flex'; 
  }
  function goToWelcomeScreen() { appScreen.style.display = 'none'; welcomeScreen.style.display = 'flex'; }
</script>
