<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AI 실시간 유해위험요인 파악</title>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
  
  <style>
    body { 
      margin: 0; 
      font-family: -apple-system, sans-serif; 
      background: #111; 
      color: white; 
      overflow: hidden; 
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }
    
    h1 { 
      position: absolute; 
      top: 15px; 
      z-index: 10; 
      font-size: 1.1rem; 
      background: rgba(0, 0, 0, 0.7); 
      padding: 8px 18px; 
      border-radius: 20px; 
      margin: 0;
      border: 1px solid #ffcc00;
    }
    
    /* 가로/세로에 따라 화면에 꽉 차도록 유연한 컨테이너 설정 */
    #video-container { 
      position: relative; 
      width: 95vw; 
      height: 75vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    /* 비율을 유지하되 화면에 꽉 차게 렌더링 */
    video { 
      width: 100%; 
      height: 100%; 
      object-fit: contain; /* 가로 세로 비율 유지 */
      border-radius: 12px; 
      background: #000; 
    }
    
    /* 캔버스가 비디오 위에 자석처럼 딱 달라붙도록 설정 */
    canvas { 
      position: absolute; 
      pointer-events: none; 
    }
    
    #loading { 
      position: absolute; 
      bottom: 30px; 
      font-size: 0.9rem; 
      color: #bbbbbb; 
      background: rgba(0,0,0,0.5);
      padding: 5px 15px;
      border-radius: 10px;
      z-index: 10;
    }

    /* 팝업 모달 */
    #modal {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.85); 
      display: flex; align-items: center; justify-content: center; 
      z-index: 100;
    }
    .modal-content {
      background: #222; padding: 30px; border-radius: 16px; text-align: center; max-width: 85%; border: 1px solid #444;
    }
    .modal-content p { margin-top: 0; margin-bottom: 25px; font-size: 1.1rem; line-height: 1.5; }
    .btn-group { display: flex; gap: 15px; justify-content: center; }
    button { padding: 12px 30px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 1rem; }
    .btn-yes { background: #ffcc00; color: #000; }
    .btn-no { background: #444; color: white; }
  </style>
</head>
<body>

<div id="container">
  <h1>AI 실시간 유해위험요인 파악</h1>
  
  <div id="video-container">
    <video id="webcam" autoplay playsinline muted></video>
    <canvas id="overlay"></canvas>
  </div>

  <div id="loading">시스템 초기화 중...</div>
</div>

<div id="modal">
  <div class="modal-content">
    <p>실시간 영상 촬영 및 AI 분석을 위해<br>카메라 권한을 허용하시겠습니까?</p>
    <div class="btn-group">
      <button class="btn-yes" onclick="startApp()">예 (허용)</button>
      <button class="btn-no" onclick="location.reload()">아니오</button>
    </div>
  </div>
</div>

<script>
  const video = document.getElementById('webcam');
  const canvas = document.getElementById('overlay');
  const ctx = canvas.getContext('2d');
  const loadingText = document.getElementById('loading');
  const modal = document.getElementById('modal');
  let model = null;

  async function loadModel() {
    loadingText.innerText = "AI 안전 분석 모델 로딩 중...";
    model = await cocoSsd.load();
    loadingText.innerText = "분석 작동 중 (실시간 탐지)";
  }

  async function startApp() {
    modal.style.display = 'none';
    
    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: "environment" },
        audio: false
      });
      video.srcObject = stream;
      
      video.onloadedmetadata = async () => {
        // [iOS 필수 조치] 비디오 요소 자체에 해상도 크기를 명시적으로 주입
        video.width = video.videoWidth;
        video.height = video.videoHeight;
        
        await loadModel();
        
        // 가로/세로 화면 회전 시 캔버스 크기를 다시 맞추기 위한 이벤트 등록
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
        
        detectFrame();
      };
    } catch (err) {
      alert("카메라를 켤 수 없습니다: " + err.message);
    }
  }

  // 비디오 화면 크기와 캔버스 크기를 완벽하게 일치시키는 함수
  function resizeCanvas() {
    const rect = video.getBoundingClientRect();
    canvas.style.width = rect.width + 'px';
    canvas.style.height = rect.height + 'px';
    canvas.style.top = video.offsetTop + 'px';
    canvas.style.left = video.offsetLeft + 'px';
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
  }

  async function detectFrame() {
    if (!model) return;

    if (video.readyState === video.HAVE_ENOUGH_DATA) {
      const predictions = await model.detect(video);
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      predictions.forEach(prediction => {
        const [x, y, width, height] = prediction.bbox;
        const label = prediction.class;
        const score = Math.round(prediction.score * 100);

        // 기본 값 설정
        let hazardType = `미분류 요인 (${label})`;
        let boxColor = "#ffcc00"; 

        // 위험 요인 매칭 로직
        if (label === 'person') {
          hazardType = "작업자 감지 (추락/충돌 주의)";
          boxColor = "#ffcc00";
        } else if (['truck', 'car', 'bus'].includes(label)) {
          hazardType = "중장비/차량 (부딪힘 위험)";
          boxColor = "#ff3300";
        } 
        // --- 실내/책상 테스트용 일상 사물 규칙 추가 ---
        else if (label === 'cell phone') {
          hazardType = "스마트폰 사용 (보행 주의)";
          boxColor = "#ff3300";
        } else if (['cup', 'bottle'].includes(label)) {
          hazardType = "액체 물질 (미끄러짐 위험)";
          boxColor = "#00FF00";
        } else if (['laptop', 'keyboard', 'mouse', 'tv'].includes(label)) {
          hazardType = "전자기기 (감전/과열 주의)";
          boxColor = "#00FF00";
        } else if (label === 'chair') {
          hazardType = "방치된 의자 (전도 위험)";
          boxColor = "#00FF00";
        }

        // 박스 그리기
        ctx.strokeStyle = boxColor;
        ctx.lineWidth = 6; // 모바일에서 잘 보이도록 두껍게 변경
        ctx.strokeRect(x, y, width, height);

        // 라벨 배경 및 텍스트
        ctx.fillStyle = boxColor;
        ctx.font = "bold 20px Arial";
        const textStr = `${hazardType} [${score}%]`;
        const textWidth = ctx.measureText(textStr).width;
        
        ctx.fillRect(x, y - 32, textWidth + 12, 32);
        ctx.fillStyle = "#000000";
        ctx.fillText(textStr, x + 6, y - 10);
      });
    }
    requestAnimationFrame(detectFrame);
  }
</script>

</body>
</html>
