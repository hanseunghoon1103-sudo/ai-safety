<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AI 실시간 유해위험요인 파악 (YOLOv8 ONNX)</title>
  
  <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
  
  <style>
    body { margin: 0; font-family: -apple-system, sans-serif; background: #111; color: white; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
    .btn { border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: background 0.2s, transform 0.1s; }
    .btn:active { transform: scale(0.98); }
    #welcome-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 30px; box-sizing: border-box; }
    .icon-shield { font-size: 5rem; margin-bottom: 20px; animation: pulse 2s infinite; }
    @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
    .main-title { font-size: 1.6rem; color: #ffcc00; margin: 0 0 15px 0; }
    .sub-text { color: #aaa; font-size: 0.95rem; line-height: 1.6; margin-bottom: 40px; }
    .btn-start { padding: 16px 50px; background: #ffcc00; color: #000; font-size: 1.2rem; border-radius: 30px; box-shadow: 0 4px 15px rgba(255, 204, 0, 0.3); }
    #app-screen { display: none; flex-direction: column; align-items: center; justify-content: center; width: 100%; height: 100%; }
    #header-bar { position: absolute; top: 15px; z-index: 10; width: 95vw; max-width: 500px; display: flex; justify-content: space-between; align-items: center; background: rgba(0, 0, 0, 0.75); padding: 8px 15px; border-radius: 25px; border: 1px solid #ffcc00; box-sizing: border-box; }
    #header-bar h1 { font-size: 1rem; margin: 0; color: #fff; }
    .btn-exit { background: #ff3300; color: white; padding: 6px 14px; border-radius: 15px; font-size: 0.85rem; }
    #video-container { position: relative; width: 95vw; height: 75vh; display: flex; align-items: center; justify-content: center; }
    video { width: 100%; height: 100%; object-fit: contain; border-radius: 12px; background: #000; }
    canvas { position: absolute; pointer-events: none; }
    #loading { position: absolute; bottom: 30px; font-size: 0.9rem; color: #bbbbbb; background: rgba(0,0,0,0.5); padding: 5px 15px; border-radius: 10px; z-index: 10; }
    #confirm-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.85); display: none; align-items: center; justify-content: center; z-index: 100; }
    .modal-box { background: #222; padding: 30px; border-radius: 16px; text-align: center; max-width: 85%; width: 340px; border: 1px solid #444; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
    .modal-icon { font-size: 3rem; margin-bottom: 15px; color: #ffcc00; }
    .modal-text { font-size: 0.95rem; line-height: 1.6; margin-bottom: 25px; color: #ddd; }
    .highlight-word { color: #ff3300; font-weight: bold; background: rgba(255, 51, 0, 0.1); padding: 2px 6px; border-radius: 4px; border: 1px solid rgba(255, 51, 0, 0.3); }
    .modal-btn-group { display: flex; gap: 12px; justify-content: center; }
    .btn-modal { padding: 12px 24px; font-size: 0.95rem; }
    .btn-cancel { background: #444; color: white; width: 40%; }
    .btn-confirm { background: #ffcc00; color: black; width: 60%; }
  </style>
</head>
<body>

  <div id="welcome-screen">
    <div class="icon-shield" id="main-icon">🛡️</div>
    <h2 class="main-title" id="welcome-title">AI 실시간 유해위험요인 파악</h2>
    <p class="sub-text" id="welcome-desc">아래 [시작하기] 버튼을 누르면 카메라가 활성화되며,<br>현장의 유해 위험 요인을 실시간으로 분석합니다.</p>
    <button class="btn btn-start" id="action-button" onclick="openModal()">시작하기</button>
  </div>

  <div id="app-screen">
    <div id="header-bar">
      <h1>AI 실시간 유해위험요인 파악</h1>
      <button class="btn btn-exit" onclick="stopApp()">종료</button>
    </div>
    <div id="video-container">
      <video id="webcam" autoplay playsinline muted></video>
      <canvas id="overlay"></canvas>
    </div>
    <div id="loading">시스템 초기화 중...</div>
  </div>

  <div id="confirm-modal">
    <div class="modal-box">
      <div class="modal-icon">⚠️</div>
      <div class="modal-text">
        실시간 분석(AI 연산)에 이 기기의 리소스를 사용합니다. 
        사용 후 <span class="highlight-word">종료버튼</span>을 꼭 눌러주세요.<br><br>
        분석을 시작하시겠습니까?
      </div>
      <div class="modal-btn-group">
        <button class="btn btn-modal btn-cancel" onclick="closeModal()">취소</button>
        <button class="btn btn-modal btn-confirm" onclick="startApp()">분석 시작하기</button>
      </div>
    </div>
  </div>

<script>
  const welcomeScreen = document.getElementById('welcome-screen');
  const appScreen = document.getElementById('app-screen');
  const confirmModal = document.getElementById('confirm-modal');
  const video = document.getElementById('webcam');
  const canvas = document.getElementById('overlay');
  const ctx = canvas.getContext('2d');
  const loadingText = document.getElementById('loading');
  
  const mainIcon = document.getElementById('main-icon');
  const welcomeTitle = document.getElementById('welcome-title');
  const welcomeDesc = document.getElementById('welcome-desc');
  const actionButton = document.getElementById('action-button');
  
  let session = null;
  let localStream = null;
  let animationFrameId = null;

  const yoloClasses = ['person', 'bicycle', 'car', 'motorcycle', 'airplane', 'bus', 'train', 'truck', 'boat', 'traffic light', 'fire hydrant', 'stop sign', 'parking meter', 'bench', 'bird', 'cat', 'dog', 'horse', 'sheep', 'cow', 'elephant', 'bear', 'zebra', 'giraffe', 'backpack', 'umbrella', 'handbag', 'tie', 'suitcase', 'frisbee', 'skis', 'snowboard', 'sports ball', 'kite', 'baseball bat', 'baseball glove', 'skateboard', 'surfboard', 'tennis racket', 'bottle', 'wine glass', 'cup', 'fork', 'knife', 'spoon', 'bowl', 'banana', 'apple', 'sandwich', 'orange', 'broccoli', 'carrot', 'hot dog', 'pizza', 'donut', 'cake', 'chair', 'couch', 'potted plant', 'bed', 'dining table', 'toilet', 'tv', 'laptop', 'mouse', 'remote', 'keyboard', 'cell phone', 'microwave', 'oven', 'toaster', 'sink', 'refrigerator', 'book', 'clock', 'vase', 'scissors', 'teddy bear', 'hair drier', 'toothbrush'];

  async function loadModel() {
    if (session) return; 
    loadingText.innerText = "YOLO 고정밀 ONNX 안전 모델 로딩 중...";
    session = await ort.InferenceSession.create('./yolov8n.onnx', { executionProviders: ['webgl', 'wasm'] });
  }

  function openModal() { confirmModal.style.display = 'flex'; }
  function closeModal() { confirmModal.style.display = 'none'; }

  async function startApp() {
    closeModal();
    welcomeScreen.style.display = 'none';
    appScreen.style.display = 'flex';
    loadingText.innerText = "카메라 연결 중...";
    
    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: "environment" },
        audio: false
      });
      localStream = stream;
      video.srcObject = stream;
      
      video.onloadedmetadata = async () => {
        video.width = video.videoWidth;
        video.height = video.videoHeight;
        
        await loadModel();
        loadingText.innerText = "YOLOv8 고속 추적 엔진 가동됨";
        
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
        
        detectFrame();
      };
    } catch (err) {
      alert("카메라 연결 실패: " + err.message);
      goToWelcomeScreen();
    }
  }

  function resizeCanvas() {
    const rect = video.getBoundingClientRect();
    canvas.style.width = rect.width + 'px';
    canvas.style.height = rect.height + 'px';
    canvas.style.top = video.offsetTop + 'px';
    canvas.style.left = video.offsetLeft + 'px';
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
  }

  async function detectFrame() {
    if (!session) return;

    if (video.readyState === video.HAVE_ENOUGH_DATA) {
      const [onnxData, w_width, h_height] = tf.tidy(() => {
        const img = tf.browser.fromPixels(video)
          .resizeNearestNeighbor([640, 640])
          .toFloat()
          .div(tf.scalar(255.0));
        const transposed = img.transpose([2, 0, 1]); 
        return [transposed.dataSync(), video.videoWidth, video.videoHeight];
      });

      const inputTensor = new ort.Tensor('float32', onnxData, [1, 3, 640, 640]);
      const feeds = { [session.inputNames[0]]: inputTensor };
      
      const outputMap = await session.run(feeds);
      const outputTensor = outputMap[session.outputNames[0]];

      tf.tidy(() => {
        const result = tf.tensor(outputTensor.data, [1, 84, 8400]);
        const resTransposed = result.transpose([0, 2, 1]); 

        const boxes = tf.slice(resTransposed, [0, 0, 0], [-1, -1, 4]);
        const scores = tf.slice(resTransposed, [0, 0, 4], [-1, -1, -1]);
        
        const maxScores = scores.max(2).squeeze();
        const classes = scores.argMax(2).squeeze();

        const nmsIndices = tf.image.nonMaxSuppression(
          boxes.squeeze(), 
          maxScores, 
          20,        
          0.45,      
          0.45       
        ).arraySync();

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        const boxesArray = boxes.squeeze().arraySync();
        const classesArray = classes.arraySync();
        const scoresArray = maxScores.arraySync();

        nmsIndices.forEach(idx => {
          const box = boxesArray[idx];
          const classIdx = classesArray[idx];
          const score = Math.round(scoresArray[idx] * 100);
          const label = yoloClasses[classIdx];

          const x_center = box[0] * (canvas.width / 640);
          const y_center = box[1] * (canvas.height / 640);
          const w = box[2] * (canvas.width / 640);
          const h = box[3] * (canvas.height / 640);
          
          const x = x_center - w / 2;
          const y = y_center - h / 2;

          // 🌟 [YOLOv8 80가지 클래스 전체 통역관 매핑 사전] 🌟
          // 여기서 한글 텍스트(text)나 색상(color) 코드를 자유롭게 수정하시면 바로 앱에 반영됩니다!
          const hazardTranslation = {
            'person': { text: "작업자 감지 (추락/충돌 주의)", color: "#ffcc00" },
            'bicycle': { text: "자전거 감지 (충돌 주의)", color: "#ffcc00" },
            'car': { text: "차량 감지 (교통사고 주의)", color: "#ff3300" },
            'motorcycle': { text: "오토바이 감지 (충돌 위험)", color: "#ff3300" },
            'airplane': { text: "항공기 감지 (지정 구역)", color: "#00FF00" },
            'bus': { text: "버스 감지 (사각지대 위험)", color: "#ff3300" },
            'train': { text: "열차 감지 (선로 접근 금지)", color: "#ff3300" },
            'truck': { text: "중장비/트럭 (부딪힘 치명적 위험)", color: "#ff3300" },
            'boat': { text: "선박 감지 (추락 주의)", color: "#ffcc00" },
            'traffic light': { text: "신호등 (신호 준수 확인)", color: "#00FF00" },
            'fire hydrant': { text: "소화전 (진입로 확보 필수)", color: "#00FF00" },
            'stop sign': { text: "정지 표지판 (일시 정지)", color: "#ff3300" },
            'parking meter': { text: "주차 요금기 (시설물)", color: "#00FF00" },
            'bench': { text: "벤치 (휴식 공간)", color: "#00FF00" },
            'bird': { text: "조류 감지 (동물 주의)", color: "#00FF00" },
            'cat': { text: "고양이 감지 (동물 보호/주의)", color: "#00FF00" },
            'dog': { text: "개 감지 (물림 사고 주의)", color: "#ffcc00" },
            'horse': { text: "말 감지 (대형 동물 주의)", color: "#ffcc00" },
            'sheep': { text: "양 감지 (가축)", color: "#00FF00" },
            'cow': { text: "소 감지 (대형 동물 주의)", color: "#ffcc00" },
            'elephant': { text: "코끼리 감지 (접근 금지)", color: "#ff3300" },
            'bear': { text: "곰 감지 (즉시 대피 요망)", color: "#ff3300" },
            'zebra': { text: "얼룩말 감지 (동물 구역)", color: "#00FF00" },
            'giraffe': { text: "기린 감지 (대형 동물)", color: "#00FF00" },
            'backpack': { text: "방치된 배낭 (장애물/분실물)", color: "#ffcc00" },
            'umbrella': { text: "우산 (시야 가림 주의)", color: "#00FF00" },
            'handbag': { text: "핸드백 (소지품 소지)", color: "#00FF00" },
            'tie': { text: "넥타이 (회전체 끼임 주의)", color: "#ffcc00" },
            'suitcase': { text: "여행 가방 (통행 방해물)", color: "#ffcc00" },
            'frisbee': { text: "원반 (낙하물 주의)", color: "#00FF00" },
            'skis': { text: "스키 (미끄러짐 주의)", color: "#00FF00" },
            'snowboard': { text: "스노보드 (시설물)", color: "#00FF00" },
            'sports ball': { text: "공 발견 (낙하/충돌 주의)", color: "#ffcc00" },
            'kite': { text: "연 (고공 물체 주의)", color: "#00FF00" },
            'baseball bat': { text: "야구 배트 (타격 위험 요인)", color: "#ff3300" },
            'baseball glove': { text: "야구 글러브 (체육 용품)", color: "#00FF00" },
            'skateboard': { text: "스케이트보드 (미끄러짐 위험)", color: "#ffcc00" },
            'surfboard': { text: "서프보드 (수상 안전)", color: "#00FF00" },
            'tennis racket': { text: "테니스 라켓 (체육 용품)", color: "#00FF00" },
            'bottle': { text: "병 감지 (액체 미끄러짐/파손 주의)", color: "#00FF00" },
            'wine glass': { text: "유리잔 (파손 및 베임 위험)", color: "#ff3300" },
            'cup': { text: "컵 발견 (미끄러짐/투기 주의)", color: "#00FF00" },
            'fork': { text: "포크 (날카로운 도구 주의)", color: "#ffcc00" },
            'knife': { text: "칼 발견 (날카로운 흉기/베임 치명 위험)", color: "#ff3300" },
            'spoon': { text: "숟가락 (식기류)", color: "#00FF00" },
            'bowl': { text: "그릇 (식기류)", color: "#00FF00" },
            'banana': { text: "바나나 (껍질 미끄러짐 위험)", color: "#ffcc00" },
            'apple': { text: "사과 (음식물 폐기)", color: "#00FF00" },
            'sandwich': { text: "샌드위치 (음식물)", color: "#00FF00" },
            'orange': { text: "오렌지 (음식물)", color: "#00FF00" },
            'broccoli': { text: "브로콜리 (음식물)", color: "#00FF00" },
            'carrot': { text: "당근 (음식물)", color: "#00FF00" },
            'hot dog': { text: "핫도그 (음식물)", color: "#00FF00" },
            'pizza': { text: "피자 (음식물)", color: "#00FF00" },
            'donut': { text: "도넛 (음식물)", color: "#00FF00" },
            'cake': { text: "케이크 (음식물)", color: "#00FF00" },
            'chair': { text: "방치된 의자 (전도/통행 방해 위험)", color: "#00FF00" },
            'couch': { text: "소파 (대형 가구/통행 제한)", color: "#ffcc00" },
            'potted plant': { text: "화분 (깨짐/낙하 주의)", color: "#00FF00" },
            'bed': { text: "침대 (대형 집기)", color: "#00FF00" },
            'dining table': { text: "식탁 (대형 집기류)", color: "#00FF00" },
            'toilet': { text: "변기 (위생 시설물)", color: "#00FF00" },
            'tv': { text: "모니터/TV (전자기기 과열 주의)", color: "#00FF00" },
            'laptop': { text: "노트북 컴퓨터 (감전/화재 주의)", color: "#00FF00" },
            'mouse': { text: "마우스 (전산 부품)", color: "#00FF00" },
            'remote': { text: "리모컨 (제어 장치)", color: "#00FF00" },
            'keyboard': { text: "키보드 (전산 부품)", color: "#00FF00" },
            'cell phone': { text: "스마트폰 사용 중 (보행 주의 경고)", color: "#ff3300" },
            'microwave': { text: "전자레인지 (고온/화상 위험)", color: "#ff3300" },
            'oven': { text: "오븐 (화재/고온 치명적 위험)", color: "#ff3300" },
            'toaster': { text: "토스터기 (전열기구 화재 주의)", color: "#ff3300" },
            'sink': { text: "싱크대 (누수/물넘침 주의)", color: "#ffcc00" },
            'refrigerator': { text: "냉장고 (대형 가전 제품)", color: "#00FF00" },
            'book': { text: "책 (적재물 화재 주의)", color: "#00FF00" },
            'clock': { text: "시계 (시간 관리)", color: "#00FF00" },
            'vase': { text: "꽃병 (파손/유리 파편 주의)", color: "#ffcc00" },
            'scissors': { text: "가위 발견 (날카로운 도구 베임 주의)", color: "#ff3300" },
            'teddy bear': { text: "인형 (방해물/낙하물)", color: "#00FF00" },
            'hair drier': { text: "헤어드라이어 (과열/감전 위험)", color: "#ff3300" },
            'toothbrush': { text: "칫솔 (위생 용품)", color: "#00FF00" }
          };

          // 사전에 정의된 값이 있으면 매핑하고, 없으면 예외용 폴백(Fallback) 적용
          let hazardType = `미분류 요인 (${label})`;
          let boxColor = "#ffcc00";

          if (hazardTranslation[label]) {
            hazardType = hazardTranslation[label].text;
            boxColor = hazardTranslation[label].color;
          }

          // [디자인 스타일 커스텀] 박스와 글자 꼬리표 배경에 투명도 50%를 적용합니다.
          ctx.globalAlpha = 0.5;
          
          // 1. 추적 사각형 그리기 (두께 3으로 날렵하게 설정)
          ctx.strokeStyle = boxColor; 
          ctx.lineWidth = 3; 
          ctx.strokeRect(x, y, w, h);

          // 2. 글자 폰트 설정 (15px로 작고 조화롭게 설정) 및 꼬리표 배경 그리기
          ctx.fillStyle = boxColor; 
          ctx.font = "bold 15px Arial";
          const textStr = `${hazardType} [${score}%]`;
          const textWidth = ctx.measureText(textStr).width;
          ctx.fillRect(x, y - 24, textWidth + 10, 24);
          
          // 3. 실제 글자 텍스트 입력 (글자는 선명하도록 알파값 1.0 복귀)
          ctx.globalAlpha = 1.0;
          ctx.fillStyle = "#000000"; 
          ctx.fillText(textStr, x + 5, y - 7);
        });
      });
    }
    animationFrameId = requestAnimationFrame(detectFrame);
  }

  function stopApp() {
    if (animationFrameId) { cancelAnimationFrame(animationFrameId); animationFrameId = null; }
    if (localStream) { localStream.getTracks().forEach(track => track.stop()); localStream = null; }
    video.srcObject = null;
    window.removeEventListener('resize', resizeCanvas);
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    appScreen.style.display = 'none';
    
    mainIcon.innerText = "✅";
    welcomeTitle.innerText = "AI 분석 안전 종료됨";
    welcomeDesc.innerHTML = "카메라 및 그래픽 하드웨어(WebGL) 리소스가 가뿐하게 반환되었습니다.<br>(스마트폰 발열 및 배터리 누수 완전 차단)";
    actionButton.innerText = "다시 시작하기";
    welcomeScreen.style.display = 'flex';
  }

  function goToWelcomeScreen() { appScreen.style.display = 'none'; welcomeScreen.style.display = 'flex'; }
</script>
</body>
</html>
